[profile.default]
src = "src"
out = "out"
libs = ["lib"]

optimizer = true
optimizer_runs = 100000

[fmt]
line_length = 100              
tab_width = 4                 
bracket_spacing = true         

multiline_func_header = "attributes_first" 

# 4. Clean-up Logic
sort_imports = true            # Alphabetizes imports automatically
wrap_comments = true           # Wraps long NatSpec to your line_length

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
